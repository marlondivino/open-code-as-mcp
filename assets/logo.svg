<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Definição de cores baseadas no tema do GitHub -->
  <style>
    .body { fill: #24292f; }
    .face { fill: #ffffff; }
    .accent { fill: #0969da; } /* Azul GitHub */
    @media (prefers-color-scheme: dark) {
      .body { fill: #f0f6fc; }
      .face { fill: #0d1117; }
      .accent { fill: #58a6ff; }
    }
  </style>

  <!-- Cabeça/Corpo Estilo Terminal -->
  <rect x="40" y="50" width="120" height="100" rx="15" class="body" />
  
  <!-- "Tela" do rosto -->
  <rect x="55" y="65" width="90" height="60" rx="8" class="face" />

  <!-- Olhos de Código < > -->
  <path d="M70 85 L60 95 L70 105" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" class="accent" />
  <path d="M130 85 L140 95 L130 105" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" class="accent" />
  
  <!-- Antena de Conexão (MCP) -->
  <line x1="100" y1="50" x2="100" y2="30" stroke-width="8" stroke-linecap="round" class="body" />
  <circle cx="100" cy="25" r="8" class="accent" />

  <!-- Braços de Plug/Cabo -->
  <path d="M40 100 Q15 100 15 125" stroke-width="8" stroke-linecap="round" fill="none" class="body" />
  <path d="M160 100 Q185 100 185 125" stroke-width="8" stroke-linecap="round" fill="none" class="body" />
  
  <!-- Detalhe da Base -->
  <rect x="70" y="150" width="60" height="10" rx="5" class="accent" opacity="0.8" />
</svg>
